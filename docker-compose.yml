services:
  app:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=weather_app
      - DB_PASSWORD=Hestehop11235!
      - DB_NAME=weather_db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=weather_app
      - POSTGRES_PASSWORD=Hestehop11235!
      - POSTGRES_DB=weather_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: